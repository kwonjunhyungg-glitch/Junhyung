<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Floating Pills</title>

<style>
  body {
    margin: 0;
    background: #f7f7f8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  canvas {
    display: block;
  }

  #inputBox {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    padding: 14px 18px;
    border-radius: 999px;
    border: 1px solid #e6e6eb;
    background: #ffffff;
    font-size: 14px;
    outline: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  }
</style>
</head>

<body>
<canvas id="canvas"></canvas>
<input id="inputBox" placeholder="단어 입력 후 Enter" />

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const input = document.getElementById("inputBox");

let bubbles = [];

// Figma UI3 느낌의 muted palette
const COLORS = [
  "#E8F0FE", "#E6F4EA", "#FCE8E6",
  "#FFF4E5", "#F3E8FD", "#E0F7FA"
];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

class Bubble {
  constructor(text) {
    this.text = text;

    ctx.font = "14px sans-serif";
    const textWidth = ctx.measureText(text).width;

    this.width = textWidth + 32;
    this.height = 36;
    this.radius = this.height / 2;

    this.x = Math.random() * (canvas.width - this.width);
    this.y = canvas.height + 40;

    this.vx = (Math.random() - 0.5) * 1.2;
    this.vy = -1.2 - Math.random();

    this.phase = Math.random() * Math.PI * 2;

    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  update() {
    this.vy -= 0.004;

    this.phase += 0.03;
    this.x += this.vx + Math.sin(this.phase) * 0.3;
    this.y += this.vy;

    // 벽 충돌
    if (this.x < 0) {
      this.x = 0;
      this.vx *= -0.6;
    }

    if (this.x + this.width > canvas.width) {
      this.x = canvas.width - this.width;
      this.vx *= -0.6;
    }

    if (this.y < 0) {
      this.y = 0;
      this.vy *= -0.4;
    }

    // 감속
    this.vx *= 0.999;
    this.vy *= 0.999;
  }

  draw() {
    const x = this.x;
    const y = this.y;
    const w = this.width;
    const h = this.height;
    const r = this.radius;

    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();

    ctx.fillStyle = this.color;
    ctx.strokeStyle = "#dcdce0";
    ctx.lineWidth = 1;

    ctx.fill();
    ctx.stroke();

    // text
    ctx.fillStyle = "#1f1f22";
    ctx.font = "14px sans-serif";
    ctx.textBaseline = "middle";
    ctx.fillText(this.text, x + 16, y + h / 2);
  }
}

function handleCollisions() {
  for (let i = 0; i < bubbles.length; i++) {
    for (let j = i + 1; j < bubbles.length; j++) {
      const a = bubbles[i];
      const b = bubbles[j];

      if (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      ) {
        let dx = (a.x + a.width / 2) - (b.x + b.width / 2);
        let dy = (a.y + a.height / 2) - (b.y + b.height / 2);

        a.vx += dx * 0.001;
        a.vy += dy * 0.001;
        b.vx -= dx * 0.001;
        b.vy -= dy * 0.001;
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  handleCollisions();

  bubbles.forEach(b => {
    b.update();
    b.draw();
  });

  requestAnimationFrame(animate);
}

animate();

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && input.value.trim()) {
    bubbles.push(new Bubble(input.value.trim()));
    input.value = "";
  }
});
</script>
</body>
</html>
